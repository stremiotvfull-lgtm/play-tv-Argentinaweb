<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAY TV - PRUEBA</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .header { color: #00ffcc; padding: 10px; border-bottom: 2px solid #00ffcc; margin-bottom: 15px; }
        #search { width: 90%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 15px; background: #222; color: #fff; }
        .channel-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .channel-item { background: #1a1a1a; padding: 15px; border-radius: 10px; cursor: pointer; border: 1px solid #333; font-size: 13px; color: #00ffcc; }
        #player-container { position: sticky; top: 0; background: #000; padding: 5px; display: none; z-index: 100; }
        video { width: 100%; border: 1px solid #00ffcc; }
    </style>
</head>
<body>

<div class="header">PLAY TV - MODO PRUEBA</div>

<div id="player-container">
    <video id="video" controls></video>
    <button onclick="cerrarPlayer()" style="background:red; color:white; width:100%; border:none; padding:10px; margin-top:5px; border-radius:5px;">CERRAR</button>
</div>

<input type="text" id="search" placeholder="Buscar canal..." onkeyup="filterChannels()">

<div class="channel-list" id="list">Cargando canales de prueba...</div>

<script>
    // Probamos con tu lista corta
    const m3uUrl = 'FullTVpremium.m3u'; 
    let channels = [];

    async function loadM3U() {
        try {
            const response = await fetch(m3uUrl);
            const data = await response.text();
            parseM3U(data);
        } catch (e) {
            document.getElementById('list').innerHTML = "Subí el archivo .m3u a GitHub para que aparezcan.";
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF:')) {
                const name = lines[i].split(',')[1] || "Canal";
                const link = lines[i + 1]?.trim();
                if (link && link.startsWith('http')) {
                    channels.push({ name, link });
                }
            }
        }
        renderChannels(channels);
    }

    function renderChannels(list) {
        const container = document.getElementById('list');
        container.innerHTML = list.map(c => `<div class="channel-item" onclick="playChannel('${c.link}')">${c.name}</div>`).join('');
    }

    function filterChannels() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
        renderChannels(filtered);
    }

    function playChannel(url) {
        const video = document.getElementById('video');
        document.getElementById('player-container').style.display = 'block';
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
        window.scrollTo(0,0);
    }

    function cerrarPlayer() {
        const video = document.getElementById('video');
        video.pause();
        document.getElementById('player-container').style.display = 'none';
    }

    loadM3U();
</script>
</body>
</html>
